[server]
host = "127.0.0.1"
port = 8001
cors_origins = ["*"]

[frontend]
api_base_url = "http://127.0.0.1:8001"
title = "CorpusAgent2 Prototype"

[llm]
use_openai = false
openai_base_url = "https://api.openai.com/v1"
openai_planner_model = "gpt-4.1-mini"
openai_synthesis_model = "gpt-4.1-mini"
unclose_base_url = "https://hermes.ai.unturf.com/v1"
unclose_planner_model = "adamo1139/Hermes-3-Llama-3.1-8B-FP8-Dynamic"
unclose_synthesis_model = "adamo1139/Hermes-3-Llama-3.1-8B-FP8-Dynamic"
timeout_s = 60
verify_ssl = true

[retrieval]
backend = "local"
default_mode = "hybrid"
use_rerank = true
rerank_top_k = 25
fusion_k = 60

[runtime]
device = "auto"

[postgres]
dsn = "postgresql://corpus:corpus@localhost:5432/corpus_db"
table = "article_corpus"

[opensearch]
url = "https://localhost:9200"
index = "article-corpus-opensearch"
username = "admin"
password = "VerySecurePassword123!"
verify_ssl = false
timeout_s = 20

[provider_order]
tokenize = ["spacy", "stanza", "nltk", "regex"]
sentence_split = ["spacy", "stanza", "nltk", "heuristic"]
pos_morph = ["spacy", "stanza", "flair", "nltk", "heuristic"]
lemmatize = ["spacy", "stanza", "textblob", "heuristic"]
ner = ["spacy", "stanza", "flair", "regex"]
sentiment = ["flair", "textblob", "heuristic"]
topic_model = ["textacy", "gensim", "heuristic"]
