services:
  corpusagent2-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CORPUSAGENT2_DOCKER_TORCH_PROFILE: ${CORPUSAGENT2_DOCKER_TORCH_PROFILE:-cpu}
        CORPUSAGENT2_DOCKER_INSTALL_NLP_PROVIDERS: ${CORPUSAGENT2_DOCKER_INSTALL_NLP_PROVIDERS:-false}
        CORPUSAGENT2_DOCKER_DOWNLOAD_PROVIDER_ASSETS: ${CORPUSAGENT2_DOCKER_DOWNLOAD_PROVIDER_ASSETS:-false}
    image: corpusagent2-runtime:latest
    container_name: corpusagent2_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      CORPUSAGENT2_PROJECT_ROOT: /app
      CORPUSAGENT2_SERVER_HOST: 0.0.0.0
      CORPUSAGENT2_SERVER_PORT: ${CORPUSAGENT2_SERVER_PORT:-8001}
      CORPUSAGENT2_PG_DSN: ${CORPUSAGENT2_DOCKER_PG_DSN:-postgresql://corpus:corpus@postgres:5432/corpus_db}
      CORPUSAGENT2_OPENSEARCH_URL: ${CORPUSAGENT2_DOCKER_OPENSEARCH_URL:-https://opensearch:9200}
      CORPUSAGENT2_OPENSEARCH_USERNAME: ${CORPUSAGENT2_OPENSEARCH_USERNAME:-admin}
      CORPUSAGENT2_OPENSEARCH_PASSWORD: ${CORPUSAGENT2_OPENSEARCH_PASSWORD:-VerySecurePassword123!}
      CORPUSAGENT2_OPENSEARCH_VERIFY_SSL: "false"
      CORPUSAGENT2_REQUIRE_BACKEND_SERVICES: "true"
      CORPUSAGENT2_ALLOW_LOCAL_FALLBACK: "false"
      CORPUSAGENT2_DEVICE: ${CORPUSAGENT2_DEVICE:-cpu}
      CORPUSAGENT2_DENSE_MODEL_ID: ${CORPUSAGENT2_DOCKER_DENSE_MODEL_ID:-/models/e5-base-v2}
      CORPUSAGENT2_PYTHON_RUNNER_SHARED_TMP: ${CORPUSAGENT2_PYTHON_RUNNER_SHARED_TMP:-/tmp/corpusagent2_python_runner}
    command: ["python", "/app/scripts/12_run_agent_api.py"]
    ports:
      - "127.0.0.1:${CORPUSAGENT2_SERVER_PORT:-8001}:8001"
    volumes:
      - ../data:/app/data:ro
      - ../outputs:/app/outputs
      - type: bind
        source: ${CORPUSAGENT2_DENSE_MODEL_HOST_PATH:-../../e5-base-v2}
        target: ${CORPUSAGENT2_DOCKER_DENSE_MODEL_ID:-/models/e5-base-v2}
        read_only: true
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CORPUSAGENT2_PYTHON_RUNNER_SHARED_TMP:-/tmp/corpusagent2_python_runner}:${CORPUSAGENT2_PYTHON_RUNNER_SHARED_TMP:-/tmp/corpusagent2_python_runner}
    cpus: "${CORPUSAGENT2_API_CPUS:-4}"
    mem_limit: "${CORPUSAGENT2_API_MEM_LIMIT:-6g}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20

  postgres:
    image: pgvector/pgvector:pg16
    container_name: corpus_postgres
    restart: unless-stopped
    shm_size: 1gb
    environment:
      POSTGRES_USER: corpus
      POSTGRES_PASSWORD: corpus
      POSTGRES_DB: corpus_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ${CORPUSAGENT2_DOCKER_DATA_DIR:-./data}/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corpus -d corpus_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: os_news
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: -Xms1g -Xmx1g
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${CORPUSAGENT2_OPENSEARCH_PASSWORD:-VerySecurePassword123!}
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9600:9600"
    volumes:
      - ${CORPUSAGENT2_DOCKER_DATA_DIR:-./data}/osdata:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sk -u admin:${CORPUSAGENT2_OPENSEARCH_PASSWORD:-VerySecurePassword123!} https://localhost:9200 >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20

  opensearch-dashboards:
    profiles: ["dashboards"]
    image: opensearchproject/opensearch-dashboards:2.15.0
    container_name: os_dash
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_started
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      OPENSEARCH_SSL_VERIFICATIONMODE: none
    ports:
      - "127.0.0.1:5601:5601"
