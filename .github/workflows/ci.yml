name: CI

on:
  push:
    branches: ["main", "master", "codex/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CORPUSAGENT2_RUN_DOCKER_TESTS: "0"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TOKENIZERS_PARALLELISM: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            deploy/requirements.docker-cpu.txt
            deploy/requirements.docker-nlp-providers.txt

      - name: Install CPU test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r deploy/requirements.docker-cpu.txt \
            -r deploy/requirements.docker-nlp-providers.txt
          pip install -e . --no-deps
          pip install pytest

      - name: Run tests
        run: pytest -q
