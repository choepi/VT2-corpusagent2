name: Deploy Static Frontend

on:
  push:
    branches: ["main", "master"]
    paths:
      - "web/**"
      - "config/**"
      - "scripts/13_write_frontend_config.py"
      - ".github/workflows/pages.yml"
      - "src/corpusagent2/app_config.py"
      - "src/corpusagent2/app_secrets.py"
  pull_request:
    paths:
      - "web/**"
      - "config/**"
      - "scripts/13_write_frontend_config.py"
      - ".github/workflows/pages.yml"
      - "src/corpusagent2/app_config.py"
      - "src/corpusagent2/app_secrets.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validate static frontend
    runs-on: ubuntu-latest
    env:
      CORPUSAGENT2_FRONTEND_API_BASE_URL: https://api.dongtse.com
      CORPUSAGENT2_FRONTEND_ACCESS_GATE: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate frontend runtime config
        run: python scripts/13_write_frontend_config.py

      - name: Check required static files
        run: |
          test -f web/index.html
          test -f web/app.js
          test -f web/styles.css
          test -f web/config.js

  deploy:
    name: Deploy static frontend
    needs: validate
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      CORPUSAGENT2_FRONTEND_API_BASE_URL: https://api.dongtse.com
      CORPUSAGENT2_FRONTEND_ACCESS_GATE: "true"
      CORPUSAGENT2_FRONTEND_ACCESS_TITLE: Private Demo Access
      CORPUSAGENT2_FRONTEND_ACCESS_SUBTITLE: Enter the shared passphrase to continue.
      CORPUSAGENT2_FRONTEND_ACCESS_PASSWORD_SHA256: ${{ secrets.CORPUSAGENT2_FRONTEND_ACCESS_PASSWORD_SHA256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate frontend gate secret
        run: |
          if [ "${CORPUSAGENT2_FRONTEND_ACCESS_GATE}" = "true" ] && [ -z "${CORPUSAGENT2_FRONTEND_ACCESS_PASSWORD_SHA256}" ]; then
            echo "::warning::CORPUSAGENT2_FRONTEND_ACCESS_PASSWORD_SHA256 is missing; disabling the static frontend access gate for this deploy."
            echo "CORPUSAGENT2_FRONTEND_ACCESS_GATE=false" >> "$GITHUB_ENV"
          fi

      - name: Generate frontend runtime config
        run: python scripts/13_write_frontend_config.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
