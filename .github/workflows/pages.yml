name: Deploy Static Frontend

on:
  push:
    branches: ["main", "master"]
    paths:
      - "web/**"
      - "config/**"
      - "scripts/13_write_frontend_config.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      CORPUSAGENT2_FRONTEND_API_BASE_URL: https://api.dongtse.com
      CORPUSAGENT2_FRONTEND_ACCESS_GATE: "true"
      CORPUSAGENT2_FRONTEND_ACCESS_TITLE: Private Demo Access
      CORPUSAGENT2_FRONTEND_ACCESS_SUBTITLE: Enter the shared passphrase to continue.
      CORPUSAGENT2_FRONTEND_ACCESS_PASSWORD_SHA256: ${{ secrets.CORPUSAGENT2_FRONTEND_ACCESS_PASSWORD_SHA256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate frontend gate secret
        run: |
          if [ "${CORPUSAGENT2_FRONTEND_ACCESS_GATE}" = "true" ] && [ -z "${CORPUSAGENT2_FRONTEND_ACCESS_PASSWORD_SHA256}" ]; then
            echo "CORPUSAGENT2_FRONTEND_ACCESS_PASSWORD_SHA256 GitHub secret is required when the frontend access gate is enabled." >&2
            exit 1
          fi

      - name: Generate frontend runtime config
        run: python scripts/13_write_frontend_config.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
